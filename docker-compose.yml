services:
  postgres:
    image: postgres:16-alpine
    container_name: job-tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-job_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_tracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-job_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: job-tracker-redis
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: job-tracker-ollama
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  postgres-data:
  ollama-data:
