services:
  backend:
    build:
      context: ../backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_tracker
      SPRING_DATASOURCE_USERNAME: job_tracker
      SPRING_DATASOURCE_PASSWORD: job_tracker
      APP_JWT_SECRET: replace-with-at-least-32-characters
      APP_FRONTEND_BASE_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: job_tracker
      POSTGRES_USER: job_tracker
      POSTGRES_PASSWORD: job_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U job_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
